<!DOCTYPE html>    <html lang="en">    
<head>    
    <meta charset="UTF-8">    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <title>Happy Birthday Amina</title>    
    <style>    
        body {     
            margin: 0;     
            font-family: sans-serif;     
            background: #ff758c;     
            text-align: center;     
            color: white;     
            min-height: 100vh;     
            display: flex;     
            flex-direction: column;     
            align-items: center;     
            justify-content: center;     
        }    
        #surprise { display: none; }    
        .img-frame {     
            width: 280px;     
            height: 380px;     
            border: 8px solid white;     
            border-radius: 20px;     
            margin: 20px auto;     
            overflow: hidden;     
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);     
        }    
        img { width: 100%; height: 100%; object-fit: cover; }    
        button {     
            padding: 15px 35px;     
            font-size: 20px;     
            background: #ff3d6d;     
            color: white;     
            border: none;     
            border-radius: 50px;     
            cursor: pointer;     
            font-weight: bold;     
            transition: 0.3s;    
        }    
        button:hover { background: #e6325f; transform: scale(1.1); }    
    </style>    
</head>    
<body>    
    <div id="main">    
        <h1>POV: It's her birthday 🎂</h1>    
        <button onclick="start()">Click for Surprise 🎉</button>    
    </div>    <div id="surprise">    
    <h2>Happy Birthday Amina ❤️</h2>    
    <div class="img-frame">    
        <img id="slide" src="1.jpg">    
    </div>    
    <p>Stay Blessed Always! 🎈</p>    
</div>    

<script>    
    function start() {    
        document.getElementById("main").style.display = "none";    
        document.getElementById("surprise").style.display = "block";    
            
        // Yahan aap apni pictures ke naam add kar sakte hain    
        const images = ["pic1.jpg","pic2.jpg","pic3.jpg"];    
        let i = 0;    
        const slideImg = document.getElementById("slide");    
            
        setInterval(() => {    
            i = (i + 1) % images.length;    
            slideImg.src = images[i];    
        }, 3000);    
    }    
</script>

</body>    
</html>
